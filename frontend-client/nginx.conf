server {
    # Port ini harus sama dengan EXPOSE di Dockerfile Anda
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # INI KUNCINYA: Jika rute tidak ditemukan, arahkan kembali ke index.html
        try_files $uri $uri/ /index.html;
    }
}