name: Deploy CardioSentries to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: project-cc3dda7e-8a0a-4231-aa7
  REGION: asia-southeast2
  GAR_REPO: cardio-repo
  AI_IMAGE: cardio-ai
  BACKEND_IMAGE: cardio-backend
  FRONTEND_IMAGE: cardio-frontend

jobs:
  # ==========================================
  # JOB 1: BUILD & DEPLOY AI SERVICE (PRIVATE)
  # ==========================================
  deploy-ai:
    name: 1. Build & Deploy AI Service
    runs-on: ubuntu-latest
    
    # Wajib untuk autentikasi WIF
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push AI Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.AI_IMAGE }}:${{ github.sha }} ./ai-service
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.AI_IMAGE }}:${{ github.sha }}

      - name: Deploy AI to Cloud Run
        id: deploy-ai
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.AI_IMAGE }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.AI_IMAGE }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --ingress=internal
            --no-allow-unauthenticated
    outputs:
      ai_url: ${{ steps.deploy-ai.outputs.url }}

  # ==========================================
  # JOB 2: BUILD & DEPLOY BACKEND (NAT + VPC)
  # ==========================================
  deploy-backend:
    name: 2. Build & Deploy Backend
    needs: deploy-ai
    runs-on: ubuntu-latest
    
    # Wajib untuk autentikasi WIF
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend-service
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_IMAGE }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            APP_MODE=production
            DB_HOST=10.22.0.5
            DB_USER=root
            DB_PASS=${{ secrets.DB_PASSWORD }}
            DB_NAME=cardio_db
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ADMIN_USERNAME=admin_pusat
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            SUPABASE_BUCKET_NAME=Ag735804@@__
            AI_SERVICE_URL=${{ needs.deploy-ai.outputs.ai_url }}/predict
          flags: |
            --network=cardio-vpc
            --subnet=cardio-subnet
            --vpc-egress=all-traffic
            --allow-unauthenticated
    outputs:
      backend_url: ${{ steps.deploy-backend.outputs.url }}

  # ==========================================
  # JOB 3: BUILD & DEPLOY FRONTEND
  # ==========================================
  deploy-frontend:
    name: 3. Build & Deploy Frontend Client
    needs: deploy-backend
    runs-on: ubuntu-latest
    
    # Wajib untuk autentikasi WIF
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Frontend Image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ needs.deploy-backend.outputs.backend_url }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            ./frontend-client
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_IMAGE }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --allow-unauthenticated